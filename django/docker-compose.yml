name: sso-d2

networks:
  sso-network:
    external: true

services:
  d2:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      D2_SECRET_KEY: ${D2_SECRET_KEY}
      D2_DATABASE_URL: postgres://d2_user:${D2_DB_PASSWORD}@postgres:5432/d2_db
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-tools-realm}
      D2_OIDC_CLIENT_ID: ${D2_OIDC_CLIENT_ID:-d2-client}
      D2_OIDC_CLIENT_SECRET: ${D2_OIDC_CLIENT_SECRET}
      D2_REDIRECT_URI: ${D2_REDIRECT_URI:-http://localhost:8002/oidc/callback/}
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sso-network
